name: 식재료 최저가 daily

on:
  schedule:
    - cron: '0 1 * * *'        # 매일 10:00 KST (01:00 UTC)
  workflow_dispatch: {}         # 수동 실행 버튼

permissions:
  contents: write               # history.csv 커밋
  pages: write                  # Pages 게시
  id-token: write               # Pages 게시

concurrency:
  group: daily
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 최저가 조회 + 기록
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python3 tracker.py

      - name: history.csv 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add history.csv
          git commit -m "chore: 가격 기록 (자동)" || { echo "변경 없음"; exit 0; }
          for i in 1 2 3; do
            git pull --no-rebase --no-edit origin main && git push && exit 0
            echo "원격이 앞서감 — 병합 후 재시도 $i"
            sleep 3
          done
          echo "push 실패"; exit 1

      - name: 페이지 준비
        run: |
          mkdir -p public
          cp dashboard.html public/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
